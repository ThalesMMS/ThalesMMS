name: Update Top Languages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  push:
    paths:
      - "scripts/generate-top-langs.mjs"
      - ".github/workflows/update-top-langs.yml"

permissions:
  contents: write

jobs:
  update-top-langs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOP_LANGS_USERNAME: ThalesMMS
          TOP_LANGS_HIDE: Rich Text Format,BibTeX Style
          TOP_LANGS_OUTPUT: assets/top-langs.svg
          TOP_LANGS_THEME: tokyonight
          TOP_LANGS_COUNT: "10"
        run: node scripts/generate-top-langs.mjs

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/top-langs.svg
          git diff --staged --quiet && exit 0
          git commit -m "chore: refresh top languages card"
          git push
